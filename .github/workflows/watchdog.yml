name: Lucid engine watchdog
# EXTERNAL dead-man's switch. Every 30 min from GitHub's cloud (independent of the
# laptop AND the server) it reads the engine liveness pulse. If the engine hasn't
# ticked in >1h (all pingers down) or the site is unreachable, the run FAILS ->
# GitHub emails the repo owner (no creds needed, Hostinger-independent), plus a
# richer SMTP email is sent best-effort. Healthy => the run passes (stays green).
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_alert:
        description: send a TEST alert email and exit 0
        type: boolean
        default: false
permissions:
  contents: write
concurrency:
  group: watchdog
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - name: Check engine liveness and alert
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          FORCE_ALERT: ${{ github.event.inputs.force_alert }}
        run: |
          set -uo pipefail
          URL="https://lucidai.pro/learn/api/engine_status.php"
          RESP=$(curl -sS -m 30 -w '\n%{http_code}' "$URL" || printf '\n000')
          CODE=$(printf '%s' "$RESP" | tail -n1)
          JSON=$(printf '%s' "$RESP" | sed '$d')
          STATUS=ok; REASON=""
          if [ "$CODE" != "200" ]; then
            STATUS=down; REASON="engine_status endpoint unreachable (HTTP $CODE) - the site or server may be DOWN"
          else
            AGE=$(printf '%s' "$JSON" | grep -oE '"last_tick_age_sec":[0-9]+' | grep -oE '[0-9]+$' || printf '999999')
            if [ "${AGE:-999999}" -gt 3600 ]; then
              STATUS=down; REASON="engine has not ticked in ${AGE}s (over 1 hour) - all pingers appear DOWN"
            fi
          fi
          echo "engine=$STATUS http=$CODE $REASON"
          echo "$JSON"
          PREV=$(cat .watchdog-state 2>/dev/null || echo ok)
          if [ "${FORCE_ALERT:-false}" = "true" ]; then
            export SUBJ="Lucid watchdog - TEST alert"
            export BODY="<p>Test of the external dead-man's switch. If you received this, the alert email path works.</p><p>Live engine status: <code>${JSON}</code></p>"
            python3 alert.py
            echo "::notice::test alert sent"
            exit 0
          fi
          commit_state () {
            echo "$1" > .watchdog-state
            git config user.name lucid-bot
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .watchdog-state && git commit -m "watchdog: $2" && git push || true
          }
          if [ "$STATUS" = "down" ]; then
            if [ "$PREV" != "down" ]; then
              export SUBJ="ALERT: Lucid engine DOWN"
              export BODY="<p>The Lucid Academy autonomous engine appears <b>DOWN</b>.</p><p>${REASON}</p><p>All independent triggers (GitHub pinger / laptop tasks / Hostinger cron) may have failed, or the site is unreachable.</p>"
              python3 alert.py
              commit_state down "ok -> down"
            fi
            echo "::error::Lucid engine DOWN - ${REASON}"
            exit 1
          else
            if [ "$PREV" = "down" ]; then
              export SUBJ="Recovered: Lucid engine ticking again"
              export BODY="<p>The engine is healthy again.</p><p>Live status: <code>${JSON}</code></p>"
              python3 alert.py
              commit_state ok "down -> ok"
            fi
            echo "engine healthy"
          fi
