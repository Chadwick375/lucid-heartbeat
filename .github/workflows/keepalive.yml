name: keepalive
# A tiny daily commit so GitHub never auto-disables the heartbeat schedule
# (scheduled workflows are disabled after 60 days of repo inactivity). This makes
# the pinger run FOREVER without anyone touching it.
on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  poke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Daily keepalive commit
        run: |
          date -u "+%Y-%m-%dT%H:%M:%SZ engine pinger alive" > heartbeat-alive.txt
          git config user.name "lucid-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add heartbeat-alive.txt
          git commit -m "keepalive $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          git push
