name: heartbeat
# Pings the Lucid Academy engine every 5 minutes from GitHub's cloud infra so the
# platform keeps running with ZERO dependency on any laptop. Public repo => free.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
concurrency:
  group: heartbeat
  cancel-in-progress: false
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping engine tick
        env:
          CRON_KEY: ${{ secrets.LUCID_CRON_KEY }}
        run: |
          set -uo pipefail
          if [ -z "${CRON_KEY:-}" ]; then echo "::error::LUCID_CRON_KEY secret missing"; exit 1; fi
          code=$(curl -sS -m 60 -o /tmp/o -w '%{http_code}' "https://lucidai.pro/learn/api/tick.php?key=${CRON_KEY}" || echo 000)
          echo "HTTP $code"; head -c 400 /tmp/o || true; echo
          if [ "$code" = "200" ] || [ "$code" = "204" ]; then echo "engine tick OK"; else echo "::warning::tick returned $code (retries next cycle)"; fi
          exit 0
